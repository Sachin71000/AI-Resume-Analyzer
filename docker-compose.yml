version: '3.9'

services:
  # ── Backend: Flask + Gunicorn ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: aat_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: sqlite:////app/instance/app.db
      ALLOWED_ORIGINS: http://localhost,http://localhost:80
      LOG_LEVEL: INFO
      WORKERS: 4
    volumes:
      - backend_uploads:/app/uploads
      - backend_db:/app/instance
    networks:
      - aat_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    expose:
      - "5000"

  # ── Frontend: React + Nginx ────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: aat_frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - aat_network
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/app.conf:ro

  # ── Redis (optional): Rate limit store + Gemini response cache ─────────────
  redis:
    image: redis:7-alpine
    container_name: aat_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - aat_network
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  backend_uploads:
  backend_db:
  redis_data:

networks:
  aat_network:
    driver: bridge
